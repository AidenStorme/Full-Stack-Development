<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IndexPost</title>
</head>
<body>

<form method="POST" action="/api/employee">
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" required><br>
    
    <label for="name">Address:</label>
    <input type="text" id="address" name="address" required><br>
    
    <label for="name">CompanyName:</label>
    <input type="text" id="companyname" name="companyname" required><br>
    
    <label for="name">Designation:</label>
    <input type="text" id="designation" name="designation" required><br>
    
    <label for="name">Salary:</label>
    <input type="text" id="salary" name="salary" required><br>
    
    <button type="submit">Submit</button>
</form>

</body>
</html>
